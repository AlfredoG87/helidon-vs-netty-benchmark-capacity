apiVersion: apps/v1
kind: Deployment
metadata:
  name: helidon-server
  namespace: benchmark
  labels:
    app: helidon-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helidon-server
  template:
    metadata:
      labels:
        app: helidon-server
    spec:
      containers:
        - name: helidon-server
          image: helidon-vs-netty-benchmark:0.0.1-SNAPSHOT-helidon
          imagePullPolicy: Never
          ports:
            - containerPort: 50052
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: helidon-server
  namespace: benchmark
spec:
  selector:
    app: helidon-server
  ports:
    - port: 50052
      targetPort: 50052
